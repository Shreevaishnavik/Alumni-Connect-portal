<nav style="background: var(--primary); color: white; display: flex; justify-content: space-between; padding: 0 20px; align-items: center; height: 60px;">
  <h2 style="margin: 0;">Alumni Connect</h2>

  <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
    <!-- Links that always go back to React app -->
    <a [href]="reactBase + '/dashboard'" style="color: white; text-decoration: none;">Dashboard</a>
    <a [href]="reactBase + '/directory'" style="color: white; text-decoration: none;">Directory</a>
    <a [href]="reactBase + '/opportunities'" style="color: white; text-decoration: none;">Opportunities</a>

    <!-- Angular internal links -->
    <a routerLink="/connections" style="color: white; text-decoration: none;">Networking</a>
    <a routerLink="/notifications" style="color: white; text-decoration: none;">
      Notifications
      <span *ngIf="unreadCount > 0"
        style="background: red; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-left: 4px;">
        {{ unreadCount }}
      </span>
    </a>

    <!-- Alumni only -->
    <ng-container *ngIf="userRole === 'alumni'">
      <a [href]="reactBase + '/my-listings'" style="color: white; text-decoration: none;">My Listings</a>
      <a [href]="reactBase + '/post-job'" style="color: white; text-decoration: none;">Post Job</a>
    </ng-container>

    <!-- Student only -->
    <a *ngIf="userRole === 'student'"
       [href]="reactBase + '/my-applications'"
       style="color: white; text-decoration: none;">My Applications</a>

    <!-- Admin only -->
    <a *ngIf="userRole === 'admin'"
       [href]="reactBase + '/admin'"
       style="color: white; text-decoration: none;">Admin Panel</a>

    <!-- Logout goes back to React login -->
    <a [href]="reactBase + '/login'"
       style="color: white; text-decoration: none; border: 1px solid white; padding: 4px 10px; border-radius: 4px;">
      Logout
    </a>
  </div>
</nav>
