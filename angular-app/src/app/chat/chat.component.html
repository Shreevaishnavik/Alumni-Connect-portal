<div class="card chat-container">
  <div class="messages">
    <div *ngFor="let msg of messages$ | async"
         [class]="msg.senderId === currentUserId ? 'my-message' : 'their-message'">
      <span>{{ msg.text }}</span>
      <small style="display: block; font-size: 10px; margin-top: 5px; opacity: 0.8;">
        {{ msg.timestamp | date:'shortTime' }}
      </small>
    </div>
    <div *ngIf="(messages$ | async)?.length === 0" style="text-align: center; color: var(--text-secondary); margin-top: 20px;">
      No messages yet. Say hi!
    </div>
  </div>
  <div class="input-area">
    <input [(ngModel)]="messageText" placeholder="Type a message..." (keyup.enter)="sendMessage()"/>
    <button class="btn-primary" (click)="sendMessage()">Send</button>
  </div>
</div>
